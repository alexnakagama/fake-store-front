<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <div id="navbar"></div>
    <div class="container py-4">
      <div class="products-page-header">
        <h1>Products</h1>
        <p>Discover our collection</p>
      </div>
      <form id="search-form" class="mb-4" autocomplete="off">
        <div class="input-group">
          <input type="search" id="search-input" class="form-control" placeholder="Search products..." aria-label="Search products">
          <button class="btn btn-outline-secondary" type="submit">
            <span class="bi bi-search"></span> Search
          </button>
        </div>
      </form>
      <div id="products-list" class="row row-cols-1 row-cols-md-4 row-cols-lg-5 g-4"></div>
    </div>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/pages/productsPage.js"></script>
  </body>
</html>
