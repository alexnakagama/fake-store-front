<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <div id="navbar"></div>

    <div class="container py-5">

      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb product-detail-breadcrumb">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item"><a href="/views/products.html">Products</a></li>
          <li class="breadcrumb-item active" id="breadcrumb-product-name">Loading...</li>
        </ol>
      </nav>

      <!-- Product Detail -->
      <div class="row g-5" id="product-detail">

        <!-- Image -->
        <div class="col-md-5">
          <div class="product-detail-img-wrapper">
            <img id="product-detail-img" src="" alt="" class="product-detail-img">
          </div>
        </div>

        <!-- Info -->
        <div class="col-md-7 d-flex flex-column justify-content-center">
          <p class="product-detail-category" id="product-detail-category"></p>
          <h1 class="product-detail-title" id="product-detail-title"></h1>
          <div class="product-detail-rating" id="product-detail-rating"></div>
          <p class="product-detail-price" id="product-detail-price"></p>
          <p class="product-detail-description" id="product-detail-description"></p>
          <div>
            <button class="btn-add-to-cart" id="btn-add-to-cart">Add to Cart</button>
          </div>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/pages/productsDetailPage.js"></script>
  </body>
</html>
