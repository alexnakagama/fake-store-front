<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body>
    <div id="navbar"></div>

    <div class="container py-5">
      <div class="products-page-header">
        <h1>Your Cart</h1>
        <p>Review your selected items</p>
      </div>

      <div class="row g-5">

        <!-- Cart Items -->
        <div class="col-lg-8">
          <div id="cart-items"></div>
        </div>

        <!-- Order Summary -->
        <div class="col-lg-4">
          <div class="cart-summary">
            <h2 class="cart-summary-title">Order Summary</h2>
            <div class="cart-summary-row">
              <span>Items</span>
              <span id="summary-count">0</span>
            </div>
            <div class="cart-summary-row cart-summary-total">
              <span>Total</span>
              <span id="summary-total">$0.00</span>
            </div>
            <button class="btn-checkout" id="btn-checkout">Checkout</button>
            <a href="/views/products.html" class="btn-back-to-products d-block text-center mt-3">← Continue Shopping</a>
          </div>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/pages/cartPage.js"></script>
  </body>
</html>
